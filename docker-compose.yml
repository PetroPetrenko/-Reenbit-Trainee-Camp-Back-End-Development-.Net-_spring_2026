version: '3.9'

services:
  backend:
    build: 
      context: .
      dockerfile: backend-wasm/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=ChatDb;User Id=sa;Password=YourStrongPassword123;TrustServerCertificate=true;
      - AzureTextAnalytics__Endpoint=${AZURE_TEXT_ANALYTICS_ENDPOINT:-}
      - AzureTextAnalytics__Key=${AZURE_TEXT_ANALYTICS_KEY:-}
    depends_on:
      - db
    networks:
      - chat-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/blazor-wasm/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - backend
    networks:
      - chat-network
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrongPassword123
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - chat-network
    restart: unless-stopped

volumes:
  sql_data:

networks:
  chat-network:
    driver: bridge
