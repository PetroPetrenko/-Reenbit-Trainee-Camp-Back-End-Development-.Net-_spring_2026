name: Deploy Backend to Azure

on:
  push:
    branches: [ main ]
    paths: [ 'backend-wasm/**' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore backend-wasm/backend-wasm.csproj

    - name: Build and Publish
      run: dotnet publish backend-wasm/backend-wasm.csproj --configuration Release --output ./publish

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_BACKEND_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_BACKEND_PUBLISH_PROFILE }}
        package: ./publish

    - name: Run Database Migrations
      run: |
        dotnet tool install --global dotnet-ef
        dotnet ef database update --project backend-wasm/backend-wasm.csproj --connection "${{ secrets.AZURE_SQL_CONNECTION_STRING }}"
